name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Validate deploy scripts
        run: bash -n scripts/deploy-vps.sh

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          OVH_SSH_PRIVATE_KEY: ${{ secrets.OVH_SSH_PRIVATE_KEY }}
          OVH_SSH_KNOWN_HOSTS: ${{ secrets.OVH_SSH_KNOWN_HOSTS }}
        run: |
          test -n "$OVH_SSH_PRIVATE_KEY"
          test -n "$OVH_SSH_KNOWN_HOSTS"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$OVH_SSH_PRIVATE_KEY" > ~/.ssh/ai-workflow-ovh_ed25519
          chmod 600 ~/.ssh/ai-workflow-ovh_ed25519
          printf '%s\n' "$OVH_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<'SSH_CONFIG'
          Host ai-workflow-ovh
            HostName 15.204.255.0
            User ubuntu
            IdentityFile ~/.ssh/ai-workflow-ovh_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          SSH_CONFIG
          chmod 600 ~/.ssh/config

      - name: Deploy to OVH
        run: bash scripts/deploy-vps.sh
