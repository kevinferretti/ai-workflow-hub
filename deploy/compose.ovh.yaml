services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5173
    volumes:
      - app-data:/app/.devflow
    expose:
      - "5173"
    networks:
      edge-proxy:
        aliases:
          - ai-workflow-hub

volumes:
  app-data:

networks:
  edge-proxy:
    external: true
